<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Set up your account</title>

  <!-- Design System Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────────────────────────
       DESIGN SYSTEM TOKENS  (source: Figma file CMoFsRR3qIQZLPi7nRoq21)
       ───────────────────────────────────────────────────────────── */
    :root {
      /* ── Color › Neutral ──────────────────────────────────────── */
      --neutral-50:  #F5F7FA;
      --neutral-100: #E4E7EB;
      --neutral-200: #CBD2D9;
      --neutral-300: #9AA5B1;
      --neutral-400: #7B8794;
      --neutral-500: #616E7C;
      --neutral-600: #52606D;
      --neutral-700: #3E4C59;
      --neutral-800: #323F4B;
      --neutral-900: #1F2933;

      /* ── Color › Primary ──────────────────────────────────────── */
      --primary-500: #3994C1;
      --primary-600: #2D83AE;
      --primary-700: #1D6F98;

      /* ── Color › Accent ───────────────────────────────────────── */
      --accent-500: #1CD4D4;
      --accent-600: #0FB5BA;
      --accent-700: #099AA4;

      /* ── Color › Support ──────────────────────────────────────── */
      --support-600: #51279B;

      /* ── Color › Feedback ─────────────────────────────────────── */
      --danger-700: #E02D3C;

      /* ── Color › Base ─────────────────────────────────────────── */
      --white: #FFFFFF;
      --black: #000000;

      /* ── Typography › Fonts ───────────────────────────────────── */
      --font-poppins: 'Poppins', sans-serif;
      --font-ibm:     'IBM Plex Sans', sans-serif;

      /* ── Typography › Display ─────────────────────────────────── */
      --type-display-large-font:   var(--font-poppins);
      --type-display-large-size:   57px;
      --type-display-large-lh:     64px;
      --type-display-large-weight: 400;
      --type-display-large-ls:     -0.25px;

      /* ── Typography › Headline ────────────────────────────────── */
      --type-headline-large-font:   var(--font-poppins);
      --type-headline-large-size:   32px;
      --type-headline-large-lh:     40px;
      --type-headline-large-weight: 400;
      --type-headline-large-ls:     0;

      --type-headline-medium-font:   var(--font-poppins);
      --type-headline-medium-size:   28px;
      --type-headline-medium-lh:     36px;
      --type-headline-medium-weight: 400;

      --type-headline-small-font:   var(--font-poppins);
      --type-headline-small-size:   24px;
      --type-headline-small-lh:     32px;
      --type-headline-small-weight: 400;

      /* ── Typography › Title ───────────────────────────────────── */
      --type-title-large-font:   var(--font-poppins);
      --type-title-large-size:   22px;
      --type-title-large-lh:     28px;
      --type-title-large-weight: 400;

      --type-title-medium-font:   var(--font-poppins);
      --type-title-medium-size:   16px;
      --type-title-medium-lh:     24px;
      --type-title-medium-weight: 500;
      --type-title-medium-ls:     0.15px;

      --type-title-small-font:   var(--font-ibm);
      --type-title-small-size:   14px;
      --type-title-small-lh:     20px;
      --type-title-small-weight: 500;
      --type-title-small-ls:     0.10px;

      /* ── Typography › Label ───────────────────────────────────── */
      --type-label-large-font:   var(--font-poppins);
      --type-label-large-size:   14px;
      --type-label-large-lh:     20px;
      --type-label-large-weight: 500;
      --type-label-large-ls:     0.10px;

      --type-label-medium-font:   var(--font-ibm);
      --type-label-medium-size:   12px;
      --type-label-medium-lh:     16px;
      --type-label-medium-weight: 500;
      --type-label-medium-ls:     0.5px;

      --type-label-small-font:   var(--font-ibm);
      --type-label-small-size:   11px;
      --type-label-small-lh:     16px;
      --type-label-small-weight: 500;
      --type-label-small-ls:     0.5px;

      /* ── Typography › Body ────────────────────────────────────── */
      --type-body-large-font:   var(--font-poppins);
      --type-body-large-size:   16px;
      --type-body-large-lh:     24px;
      --type-body-large-weight: 400;
      --type-body-large-ls:     0.5px;

      --type-body-medium-font:   var(--font-ibm);
      --type-body-medium-size:   14px;
      --type-body-medium-lh:     20px;
      --type-body-medium-weight: 400;
      --type-body-medium-ls:     0.25px;

      --type-body-small-font:   var(--font-ibm);
      --type-body-small-size:   12px;
      --type-body-small-lh:     16px;
      --type-body-small-weight: 400;
      --type-body-small-ls:     0;

      /* ── Spacing ──────────────────────────────────────────────── */
      --space-2:  2px;
      --space-6:  6px;
      --space-10: 10px;
      --space-12: 12px;
      --space-14: 14px;
      --space-16: 16px;
      --space-24: 24px;
      --space-40: 40px;
      --space-48: 48px;
      --space-70: 70px;

      /* ── Border Radius ────────────────────────────────────────── */
      --radius-input:  12px;
      --radius-button: 12px;
      --radius-card:   8px;
      --radius-frame:  40px;
    }

    /* ─────────────────────────────────────────────────────────────
       RESET
       ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--neutral-100);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 0 60px;
      font-family: var(--font-ibm);
    }

    /* ─────────────────────────────────────────────────────────────
       PHONE SHELL  (node 50:963 — 393×844)
       ───────────────────────────────────────────────────────────── */
    .phone {
      width: 393px;
      height: 844px;
      background: var(--white);
      border-radius: var(--radius-frame);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 0 10px #1A1A1A,
        0 0 0 12px #383838,
        0 40px 80px rgba(0, 0, 0, 0.30);
    }

    /* ─────────────────────────────────────────────────────────────
       iOS STATUS BAR  (node 50:964 — h=60)
       ───────────────────────────────────────────────────────────── */
    .status-bar {
      height: 60px;
      flex-shrink: 0;
      background: var(--white);
      position: relative;
      display: flex;
      align-items: flex-end;
      padding-bottom: 8px;
    }

    .status-bar__time {
      position: absolute;
      left: 24px;
      top: 13px;
      font-family: var(--font-ibm);
      font-weight: 600;
      font-size: 15px;
      line-height: 20px;
      letter-spacing: -0.5px;
      color: var(--neutral-900);
    }

    .status-bar__island {
      position: absolute;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      width: 108px;
      height: 32px;
      background: var(--neutral-900);
      border-radius: 100px;
    }

    .status-bar__icons {
      position: absolute;
      right: 19px;
      top: 17px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ─────────────────────────────────────────────────────────────
       PAGE ACTIONS / NAV BAR  (node 50:982 — h=46)
       ───────────────────────────────────────────────────────────── */
    .nav-bar {
      height: 46px;
      flex-shrink: 0;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px var(--space-16);
    }

    .nav-bar__back {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--neutral-900);
    }

    .nav-bar__title {
      font-family: var(--type-label-medium-font);
      font-size: var(--type-label-medium-size);
      font-weight: var(--type-label-medium-weight);
      line-height: var(--type-label-medium-lh);
      letter-spacing: 0.15px;
      color: var(--neutral-600);
    }

    /* invisible mirror of back button to keep title centred */
    .nav-bar__spacer {
      width: 24px;
      visibility: hidden;
    }

    /* ─────────────────────────────────────────────────────────────
       SCROLLABLE CONTENT AREA
       ───────────────────────────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-14) var(--space-12) 0;
      display: flex;
      flex-direction: column;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ─────────────────────────────────────────────────────────────
       SCREEN TITLE  (node 51:987 — Headline/Large, two-line)
       ───────────────────────────────────────────────────────────── */
    .screen-title {
      font-family: var(--type-headline-large-font);
      font-size: var(--type-headline-large-size);
      font-weight: var(--type-headline-large-weight);
      line-height: var(--type-headline-large-lh);
      letter-spacing: var(--type-headline-large-ls);
      margin-bottom: var(--space-12);
    }
    .screen-title__accent { color: var(--accent-600); }
    .screen-title__main   { color: var(--neutral-900); }

    /* ─────────────────────────────────────────────────────────────
       SUBTITLE  (node 51:988 — Body/Medium)
       ───────────────────────────────────────────────────────────── */
    .screen-subtitle {
      font-family: var(--type-body-medium-font);
      font-size: var(--type-body-medium-size);
      font-weight: var(--type-body-medium-weight);
      line-height: var(--type-body-medium-lh);
      letter-spacing: var(--type-body-medium-ls);
      color: var(--neutral-500);
      margin-bottom: var(--space-24);
    }

    /* ─────────────────────────────────────────────────────────────
       FORM
       ───────────────────────────────────────────────────────────── */
    .form {
      display: flex;
      flex-direction: column;
      gap: var(--space-10);
    }

    /* ─────────────────────────────────────────────────────────────
       INPUT FIELD  (nodes 51:989 / 51:1008 / 51:1025 / 51:1040 / 57:1035)
       ───────────────────────────────────────────────────────────── */
    .input-field {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    /* Label  →  Label/Medium token */
    .input-field__label {
      font-family: var(--type-label-medium-font);
      font-size: var(--type-label-medium-size);
      font-weight: var(--type-label-medium-weight);
      line-height: var(--type-label-medium-lh);
      letter-spacing: var(--type-label-medium-ls);
      color: var(--neutral-500);
    }

    /* Input row */
    .input-field__row {
      display: flex;
      align-items: center;
      gap: var(--space-12);
      height: 48px;
      padding: var(--space-12);
      background: var(--neutral-50);
      border: 2px solid transparent;
      border-radius: var(--radius-input);
      transition: border-color 0.15s ease;
    }
    .input-field__row:focus-within {
      border-color: var(--accent-600);
    }

    /* Error state */
    .input-field__row--error {
      border-color: var(--danger-700);
    }
    .input-field__row--error:focus-within {
      border-color: var(--danger-700);
    }

    /* Actual <input> inside the row  →  Body/Medium token */
    .input-field__input {
      flex: 1;
      min-width: 0;
      border: none;
      background: transparent;
      outline: none;
      font-family: var(--type-body-medium-font);
      font-size: var(--type-body-medium-size);
      font-weight: var(--type-body-medium-weight);
      line-height: var(--type-body-medium-lh);
      letter-spacing: var(--type-body-medium-ls);
      color: var(--neutral-800);
    }
    .input-field__input::placeholder {
      color: var(--neutral-400);
    }

    /* Leading / trailing icon slots */
    .input-field__icon {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neutral-400);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    /* Helper / error message  →  Body/Small token */
    .input-field__helper {
      font-family: var(--type-body-small-font);
      font-size: var(--type-body-small-size);
      font-weight: var(--type-body-small-weight);
      line-height: var(--type-body-small-lh);
      letter-spacing: var(--type-body-small-ls);
      color: var(--neutral-500);
    }
    .input-field__helper--error {
      color: var(--danger-700);
    }

    /* ─────────────────────────────────────────────────────────────
       PRIMARY BUTTON  (node 52:1029 — h=48, accent/600)
       ───────────────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      height: 48px;
      padding: var(--space-10) var(--space-24);
      background: var(--accent-600);
      border: none;
      border-radius: var(--radius-button);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--type-title-small-font);
      font-size: var(--type-title-small-size);
      font-weight: 600;
      line-height: var(--type-title-small-lh);
      letter-spacing: 0.1px;
      color: var(--white);
      margin-top: var(--space-6);
      transition: background 0.15s ease;
    }
    .btn-primary:hover  { background: var(--accent-700); }
    .btn-primary:active { background: var(--accent-700); opacity: 0.9; }

    /* ─────────────────────────────────────────────────────────────
       FOOTER TEXT  (node 52:1032 — Body/Small)
       ───────────────────────────────────────────────────────────── */
    .footer-text {
      text-align: center;
      font-family: var(--type-body-small-font);
      font-size: var(--type-body-small-size);
      font-weight: var(--type-body-small-weight);
      line-height: var(--type-body-small-lh);
      letter-spacing: var(--type-body-small-ls);
      color: var(--neutral-500);
      margin-top: var(--space-12);
    }
    .footer-text a {
      color: var(--accent-600);
      font-weight: 700;
      text-decoration: none;
    }
    .footer-text a:hover { text-decoration: underline; }

    /* ─────────────────────────────────────────────────────────────
       HOME BAR  (node 52:1033 — h=34)
       ───────────────────────────────────────────────────────────── */
    .home-bar {
      height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: auto;
      padding-bottom: 8px;
    }
    .home-bar__pill {
      width: 140px;
      height: 5px;
      background: var(--black);
      border-radius: 5px;
    }

    /* ── Utility ──────────────────────────────────────────────── */
    svg { display: block; }
  </style>
</head>
<body>

<div class="phone">

  <!-- ── iOS Status Bar (node 50:964, h=60) ──────────────────── -->
  <div class="status-bar" role="presentation">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__island"></div>
    <div class="status-bar__icons" aria-hidden="true">
      <!-- Cellular signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0"  y="6" width="3" height="6" rx="1" fill="#1F2933"/>
        <rect x="4"  y="4" width="3" height="8" rx="1" fill="#1F2933"/>
        <rect x="8"  y="1" width="3" height="11" rx="1" fill="#1F2933"/>
        <rect x="12" y="0" width="3" height="12" rx="1" fill="#1F2933" opacity="0.3"/>
      </svg>
      <!-- Wi-Fi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z" fill="#1F2933"/>
        <path d="M3.7 6.7C5 5.4 6.4 4.7 8 4.7s3 .7 4.3 2" stroke="#1F2933" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M1.1 4.1C3 2.2 5.4 1 8 1s5 1.2 6.9 3.1" stroke="#1F2933" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1F2933" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1F2933"/>
        <path d="M23 4v4a2 2 0 0 0 0-4Z" fill="#1F2933" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- ── Page Actions / Nav Bar (node 50:982, h=46) ────────────── -->
  <nav class="nav-bar" aria-label="Page navigation">
    <button class="nav-bar__back" aria-label="Go back" type="button">
      <!-- arrow_back_ios_new -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41Z" fill="#1F2933"/>
      </svg>
    </button>
    <span class="nav-bar__title">Set up your account</span>
    <span class="nav-bar__spacer" aria-hidden="true"></span>
  </nav>

  <!-- ── Scrollable Content ─────────────────────────────────────── -->
  <main class="content">

    <!-- Title (node 51:987) — Headline/Large -->
    <h1 class="screen-title">
      <span class="screen-title__accent">Create your</span><br>
      <span class="screen-title__main">account</span>
    </h1>

    <!-- Subtitle (node 51:988) — Body/Medium -->
    <p class="screen-subtitle">Fill in your details to set up your account.</p>

    <!-- Form -->
    <form class="form" novalidate>

      <!-- Full Name (node 51:989) — error state -->
      <div class="input-field">
        <label class="input-field__label" for="full-name">Full Name</label>
        <div class="input-field__row input-field__row--error">
          <input
            class="input-field__input"
            id="full-name"
            type="text"
            placeholder="Enter your full name"
            aria-describedby="full-name-error"
            aria-invalid="true"
            autocomplete="name"
          />
        </div>
        <span class="input-field__helper input-field__helper--error" id="full-name-error" role="alert">
          You need to insert a name
        </span>
      </div>

      <!-- Email (node 51:1008) -->
      <div class="input-field">
        <label class="input-field__label" for="email">Email</label>
        <div class="input-field__row">
          <!-- mail icon -->
          <span class="input-field__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z" fill="#7B8794"/>
            </svg>
          </span>
          <input
            class="input-field__input"
            id="email"
            type="email"
            placeholder="Enter your email"
            autocomplete="email"
          />
        </div>
      </div>

      <!-- Password (node 51:1025) -->
      <div class="input-field">
        <label class="input-field__label" for="password">Password</label>
        <div class="input-field__row">
          <!-- lock icon -->
          <span class="input-field__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2Zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4Zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2Z" fill="#7B8794"/>
            </svg>
          </span>
          <input
            class="input-field__input"
            id="password"
            type="password"
            placeholder="Create a password"
            autocomplete="new-password"
          />
          <!-- visibility toggle -->
          <button
            class="input-field__icon"
            type="button"
            aria-label="Show password"
            onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5Zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" fill="#7B8794"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password (node 51:1040) -->
      <div class="input-field">
        <label class="input-field__label" for="confirm-password">Confirm Password</label>
        <div class="input-field__row">
          <!-- lock icon -->
          <span class="input-field__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2Zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4Zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2Z" fill="#7B8794"/>
            </svg>
          </span>
          <input
            class="input-field__input"
            id="confirm-password"
            type="password"
            placeholder="Repeat your password"
            autocomplete="new-password"
          />
        </div>
      </div>

      <!-- Phone Number (node 57:1035) -->
      <div class="input-field">
        <label class="input-field__label" for="phone">Phone Number</label>
        <div class="input-field__row">
          <input
            class="input-field__input"
            id="phone"
            type="tel"
            placeholder="Enter your phone number"
            autocomplete="tel"
          />
        </div>
      </div>

      <!-- Create Account button (node 52:1029) -->
      <button class="btn-primary" type="submit">Create Account</button>

      <!-- Footer (node 52:1032) -->
      <p class="footer-text">
        Already have an account? <a href="#">Sign in</a>
      </p>

    </form>
  </main>

  <!-- ── Home Bar (node 52:1033, h=34) ───────────────────────────── -->
  <div class="home-bar" role="presentation">
    <div class="home-bar__pill"></div>
  </div>

</div>

</body>
</html>
